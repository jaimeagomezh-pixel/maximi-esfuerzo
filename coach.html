<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Entrenador — Máximo Esfuerzo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg: #f2f4f5;
  --bg2: #eaecee;
  --bg3: #e4e7e9;
  --card: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,122,133,0.2);
  --gold: #d4a843;
  --gold2: #b8902a;
  --cian: #007a85;
  --cian2: #00a8b3;
  --green: #27ae60;
  --red: #e74c3c;
  --text: #111111;
  --text2: #555555;
  --text3: #999999;
  --font-display: 'Bebas Neue', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;border-top:3px solid var(--cian2);}
.login-box{width:100%;max-width:380px;padding:0 24px;}
.login-logo{font-family:var(--font-display);font-size:2.2rem;letter-spacing:4px;color:var(--text);margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-sub{font-family:var(--font-cond);font-size:11px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:36px;}
.login-label{font-family:var(--font-cond);font-size:11px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:8px;}
.login-input{width:100%;background:#ffffff;border:1px solid rgba(0,0,0,0.15);color:var(--text);font-family:var(--font-body);font-size:15px;padding:13px 16px;border-radius:4px;outline:none;transition:border .2s;margin-bottom:16px;}
.login-input:focus{border-color:rgba(212,168,67,0.5);}
.login-btn{width:100%;background:var(--gold);color:#0a0a0a;font-family:var(--font-cond);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:14px;border:none;border-radius:4px;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--gold2);}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none;}
.login-hint{font-size:12px;color:var(--text3);margin-top:20px;text-align:center;}

/* ── MAIN PANEL ── */
#panel{display:none;min-height:100vh;}

/* Header */
.p-header{position:sticky;top:0;z-index:50;background:rgba(242,244,245,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border2);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.p-logo{font-family:var(--font-display);font-size:1.4rem;letter-spacing:3px;color:var(--text);}
.p-logo span{color:var(--gold);}
.p-logo-sub{font-family:var(--font-cond);font-size:10px;letter-spacing:3px;color:var(--cian);text-transform:uppercase;margin-left:10px;}
.p-logout{font-family:var(--font-cond);font-size:11px;letter-spacing:2px;color:var(--text3);background:none;border:none;cursor:pointer;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);border-radius:3px;transition:all .2s;}
.p-logout:hover{color:var(--red);border-color:rgba(231,76,60,0.3);}

/* Nav tabs */
.p-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;background:#fff;}
.p-tab{font-family:var(--font-cond);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:12px 16px;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.p-tab:hover{color:var(--text2);}
.p-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Content areas */
.p-content{padding:20px;}
.p-section{display:none;}
.p-section.active{display:block;}

/* ── ATLETAS LIST ── */
.p-section-title{font-family:var(--font-cond);font-size:11px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;}

.atleta-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border .2s,background .2s;}
.atleta-card:hover{border-color:rgba(212,168,67,0.3);background:#1e211f;}
.atleta-card.active{border-color:var(--gold);background:#1e211f;}
.atleta-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--cian2),#005f6b);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.1rem;color:#fff;flex-shrink:0;}
.atleta-info{flex:1;min-width:0;}
.atleta-name{font-family:var(--font-cond);font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.5px;}
.atleta-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.atleta-badge{font-family:var(--font-cond);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.badge-plan{background:rgba(0,200,212,0.1);color:var(--cian);border:1px solid rgba(0,200,212,0.2);}
.badge-asesoria{background:rgba(212,168,67,0.1);color:var(--gold);border:1px solid rgba(212,168,67,0.2);}
.badge-cuenta{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border);}
.badge-vence{font-family:var(--font-cond);font-size:10px;color:var(--text3);letter-spacing:1px;margin-left:8px;}
.badge-activo{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.badge-inactivo{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}

/* Search */
.p-search{width:100%;background:#ffffff;border:1px solid rgba(0,0,0,0.12);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 14px;border-radius:6px;outline:none;margin-bottom:16px;transition:border .2s;}
.p-search:focus{border-color:rgba(212,168,67,0.3);}
.p-search::placeholder{color:var(--text3);}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--cian2);border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.stat-num{font-family:var(--font-display);font-size:2rem;color:var(--cian);line-height:1;}
.stat-lbl{font-family:var(--font-cond);font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-top:4px;}

/* ── PERFIL ATLETA ── */
#perfilAtleta{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;}
.perfil-header{position:sticky;top:0;background:rgba(242,244,245,0.98);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:10;}
.perfil-back{background:none;border:1px solid var(--border);color:var(--text2);padding:7px 12px;border-radius:4px;cursor:pointer;font-family:var(--font-cond);font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;}
.perfil-back:hover{border-color:var(--gold);color:var(--gold);}
.perfil-title{font-family:var(--font-cond);font-size:18px;font-weight:700;letter-spacing:1px;color:var(--text);}
.perfil-subtitle{font-size:12px;color:var(--text3);margin-top:2px;}

.perfil-body{padding:16px;}

/* Perfil hero */
.perfil-hero{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;display:flex;gap:16px;align-items:flex-start;}
.perfil-avatar-big{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--cian2),#005f6b);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.6rem;color:#fff;flex-shrink:0;}
.perfil-datos{flex:1;}
.perfil-nombre{font-family:var(--font-cond);font-size:20px;font-weight:700;letter-spacing:1px;color:var(--text);}
.perfil-email{font-size:13px;color:var(--text2);margin-top:2px;}
.perfil-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.p-chip{font-family:var(--font-cond);font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.chip-plan{background:rgba(0,200,212,0.1);color:var(--cian);border:1px solid rgba(0,200,212,0.25);}
.chip-dias{background:rgba(46,204,113,0.1);color:var(--green);border:1px solid rgba(46,204,113,0.2);}
.chip-vence{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border);}

/* Datos físicos */
.datos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.dato-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.dato-val{font-family:var(--font-display);font-size:1.6rem;color:var(--text);line-height:1;}
.dato-lbl{font-family:var(--font-cond);font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-top:3px;}

/* Sección con título */
.sec{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.sec-title{font-family:var(--font-cond);font-size:11px;letter-spacing:3px;color:var(--cian2);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';width:3px;height:14px;background:var(--cian);border-radius:2px;flex-shrink:0;}

/* Strava metrics */
.strava-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.s-metric{background:var(--bg3);border-radius:6px;padding:11px;}
.s-metric-val{font-family:var(--font-cond);font-size:1.3rem;font-weight:700;color:var(--text);}
.s-metric-unit{font-size:11px;color:var(--cian);margin-left:3px;}
.s-metric-lbl{font-family:var(--font-cond);font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-top:3px;}

/* Progresión chart */
.chart-wrap{height:130px;margin-top:10px;}

/* Notas */
.nota-textarea{width:100%;background:#f8f9fa;border:1px solid rgba(0,0,0,0.1);color:var(--text);font-family:var(--font-body);font-size:13px;padding:12px;border-radius:6px;outline:none;resize:vertical;min-height:80px;transition:border .2s;}
.nota-textarea:focus{border-color:rgba(212,168,67,0.35);}
.nota-save{margin-top:8px;background:none;border:1px solid var(--border2);color:var(--gold);font-family:var(--font-cond);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border-radius:4px;cursor:pointer;transition:all .2s;}
.nota-save:hover{background:rgba(212,168,67,0.08);}

/* Pagos */
.pago-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.pago-row:last-child{border-bottom:none;}
.pago-plan{font-size:13px;color:var(--text);}
.pago-fecha{font-size:12px;color:var(--text3);margin-top:2px;}
.pago-monto{font-family:var(--font-cond);font-size:15px;font-weight:700;color:var(--green);}
.pago-estado{font-family:var(--font-cond);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:20px;}
.estado-ok{background:rgba(46,204,113,0.1);color:var(--green);border:1px solid rgba(46,204,113,0.2);}

/* Fotos progreso */
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.foto-slot{aspect-ratio:1;background:var(--bg3);border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.foto-slot img{width:100%;height:100%;object-fit:cover;}
.foto-slot-empty{font-size:20px;color:var(--text3);}

/* Fuerza TH */
.th-mini-exercise{font-family:var(--font-cond);font-size:12px;color:var(--text2);padding:7px 12px;background:var(--bg3);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:background .2s;}
.th-mini-exercise:hover,.th-mini-exercise.active{background:rgba(212,168,67,0.1);color:var(--gold);}
.th-mini-best{font-family:var(--font-display);font-size:1.8rem;color:var(--gold);}
.th-mini-unit{font-family:var(--font-cond);font-size:11px;color:var(--text3);margin-left:4px;}

/* Empty state */
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:32px;margin-bottom:12px;}
.empty-text{font-family:var(--font-cond);font-size:12px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">MÁXIMO<span>.</span>ESFUERZO</div>
    <div class="login-sub">Panel de Entrenador</div>
    <label class="login-label">Contraseña de acceso</label>
    <input type="password" class="login-input" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')verificarAcceso()">
    <button class="login-btn" onclick="verificarAcceso()">Ingresar</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
    <div class="login-hint">Acceso restringido — Solo entrenadores</div>
  </div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="panel">
  <div class="p-header">
    <div style="display:flex;align-items:baseline;gap:4px;">
      <div class="p-logo">MÁX<span>.</span></div>
      <div class="p-logo-sub">Coach Panel</div>
    </div>
    <button class="p-logout" onclick="cerrarPanel()">Salir</button>
  </div>

  <div class="p-tabs">
    <button class="p-tab active" onclick="showTab('atletas',this)">Atletas</button>
    <button class="p-tab" onclick="showTab('resumen',this)">Resumen</button>
  </div>

  <div class="p-content">

    <!-- TAB: ATLETAS -->
    <div class="p-section active" id="tab-atletas">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-lbl">Atletas</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="statActivos">0</div>
          <div class="stat-lbl">Activos</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="statPlanes">0</div>
          <div class="stat-lbl">Con plan</div>
        </div>
      </div>

      <input type="search" class="p-search" id="searchInput" placeholder="Buscar atleta..." oninput="filtrarAtletas(this.value)">
      <div class="p-section-title">Todos los atletas</div>
      <div id="atletasList"></div>
    </div>

    <!-- TAB: RESUMEN -->
    <div class="p-section" id="tab-resumen">
      <div class="p-section-title">Pagos recientes</div>
      <div id="pagosResumen"></div>
      <div class="p-section-title" style="margin-top:20px;">Próximos vencimientos</div>
      <div id="vencimientosResumen"></div>
    </div>

  </div>
</div>

<!-- PERFIL ATLETA (modal fullscreen) -->
<div id="perfilAtleta">
  <div class="perfil-header">
    <button class="perfil-back" onclick="cerrarPerfil()">← Volver</button>
    <div>
      <div class="perfil-title" id="perfilNombre">—</div>
      <div class="perfil-subtitle" id="perfilSub">—</div>
    </div>
  </div>
  <div class="perfil-body" id="perfilBody"></div>
</div>

<script>
// ── CONTRASEÑA ──────────────────────────────────────────────────────────────
const PASS = 'ME2025coach'; // Cambia esto

function verificarAcceso() {
  const val = document.getElementById('loginPass').value;
  if (val === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    iniciarPanel();
  } else {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(() => err.style.display='none', 2500);
  }
}

function cerrarPanel() {
  document.getElementById('loginPass').value = '';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ── DATOS DEMO (reemplazar con Firebase/API real) ──────────────────────────
const atletas = [
  {
    id: 1, nombre: 'Carlos Méndez', email: 'carlos@mail.com',
    plan: 'Plan Fitness Medio', tipo: 'plan',
    diasActivos: 28, vencimiento: '2026-06-20',
    peso: 82, talla: 178, edad: 31,
    activo: true,
    strava: { km: 124, ritmo: '4:52', fc: 163, actividades: 18 },
    fuerza: { 'Press Banca': [75,80,82,85,88,90,92,95,97,100,102,105], 'Peso Muerto': [120,125,130,130,135,140,142,145,150,155,158,162] },
    pagos: [
      { plan: 'Plan Fitness Medio', fecha: '2026-05-20', monto: '$45.000' },
      { plan: 'Plan Fitness Medio', fecha: '2026-04-20', monto: '$45.000' },
      { plan: 'Plan Fitness Inicial', fecha: '2026-03-20', monto: '$35.000' },
    ],
    notas: 'Buena adherencia. Enfocarse en técnica de sentadilla.',
    fotos: []
  },
  {
    id: 2, nombre: 'Valentina Ruiz', email: 'vale@mail.com',
    plan: 'Asesoría Personalizada', tipo: 'asesoria',
    diasActivos: 45, vencimiento: '2026-07-01',
    peso: 61, talla: 165, edad: 27,
    activo: true,
    strava: { km: 87, ritmo: '5:20', fc: 155, actividades: 12 },
    fuerza: { 'Sentadilla': [55,58,60,62,65,65,68,70,72,75], 'Press Banca': [40,42,45,45,47,50,52,55] },
    pagos: [
      { plan: 'Asesoría 3 meses', fecha: '2026-05-01', monto: '$90.000' },
    ],
    notas: 'Meta: media maratón Septiembre. Aumentar volumen gradual.',
    fotos: []
  },
  {
    id: 3, nombre: 'Rodrigo Soto', email: 'rodrigo@mail.com',
    plan: 'Solo cuenta creada', tipo: 'cuenta',
    diasActivos: 0, vencimiento: null,
    peso: 91, talla: 183, edad: 35,
    activo: false,
    strava: null,
    fuerza: {},
    pagos: [],
    notas: '',
    fotos: []
  },
  {
    id: 4, nombre: 'Felipe Torres', email: 'felipe@mail.com',
    plan: 'Plan Fitness Avanzado', tipo: 'plan',
    diasActivos: 62, vencimiento: '2026-06-10',
    peso: 78, talla: 175, edad: 29,
    activo: true,
    strava: { km: 210, ritmo: '4:22', fc: 170, actividades: 31 },
    fuerza: { 'Peso Muerto': [150,155,160,162,165,168,170,175,180,182,185], 'Sentadilla': [130,135,138,140,142,145,148,150,152,155,160] },
    pagos: [
      { plan: 'Plan Fitness Avanzado', fecha: '2026-05-10', monto: '$55.000' },
      { plan: 'Plan Fitness Avanzado', fecha: '2026-04-10', monto: '$55.000' },
    ],
    notas: 'Apunta a competencia de trail run. Pedir datos MyJump.',
    fotos: []
  }
];

// ── PANEL PRINCIPAL ──────────────────────────────────────────────────────────
function iniciarPanel() {
  // Stats
  document.getElementById('statTotal').textContent = atletas.length;
  document.getElementById('statActivos').textContent = atletas.filter(a=>a.activo).length;
  document.getElementById('statPlanes').textContent = atletas.filter(a=>a.tipo!=='cuenta').length;

  renderAtletas(atletas);
  renderResumen();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function renderAtletas(lista) {
  const hoy = new Date();
  document.getElementById('atletasList').innerHTML = lista.map(a => {
    const tipoClass = a.tipo === 'plan' ? 'badge-plan' : a.tipo === 'asesoria' ? 'badge-asesoria' : 'badge-cuenta';
    const tipoLabel = a.tipo === 'plan' ? 'Plan activo' : a.tipo === 'asesoria' ? 'Asesoría' : 'Sin plan';
    const dotClass = a.activo ? 'badge-activo' : 'badge-inactivo';
    let venceStr = '';
    if (a.vencimiento) {
      const dias = Math.ceil((new Date(a.vencimiento) - hoy) / 86400000);
      venceStr = `<span class="badge-vence">Vence en ${dias}d</span>`;
    }
    return `<div class="atleta-card" onclick="abrirPerfil(${a.id})">
      <div class="${dotClass}"></div>
      <div class="atleta-avatar">${a.nombre.charAt(0)}</div>
      <div class="atleta-info">
        <div class="atleta-name">${a.nombre}</div>
        <div class="atleta-meta">${a.diasActivos} días activo · ${a.email}</div>
      </div>
      <div style="text-align:right;">
        <div class="atleta-badge ${tipoClass}">${tipoLabel}</div>
        ${venceStr}
      </div>
    </div>`;
  }).join('');
}

function filtrarAtletas(q) {
  const f = atletas.filter(a => a.nombre.toLowerCase().includes(q.toLowerCase()) || a.email.toLowerCase().includes(q.toLowerCase()));
  renderAtletas(f);
}

function renderResumen() {
  // Pagos recientes (todos)
  const pagos = atletas.flatMap(a => a.pagos.map(p => ({...p, atleta: a.nombre}))).slice(0, 6);
  document.getElementById('pagosResumen').innerHTML = pagos.length ? pagos.map(p => `
    <div class="pago-row">
      <div>
        <div class="pago-plan">${p.atleta} · ${p.plan}</div>
        <div class="pago-fecha">${p.fecha}</div>
      </div>
      <div style="text-align:right;">
        <div class="pago-monto">${p.monto}</div>
        <span class="pago-estado estado-ok">Pagado</span>
      </div>
    </div>`).join('') : '<div class="empty"><div class="empty-text">Sin pagos registrados</div></div>';

  // Vencimientos próximos
  const hoy = new Date();
  const prox = atletas
    .filter(a => a.vencimiento)
    .map(a => ({ nombre: a.nombre, plan: a.plan, venc: new Date(a.vencimiento), dias: Math.ceil((new Date(a.vencimiento)-hoy)/86400000) }))
    .sort((a,b) => a.dias - b.dias)
    .slice(0, 5);
  document.getElementById('vencimientosResumen').innerHTML = prox.map(v => `
    <div class="atleta-card" style="cursor:default;">
      <div class="atleta-avatar">${v.nombre.charAt(0)}</div>
      <div class="atleta-info">
        <div class="atleta-name">${v.nombre}</div>
        <div class="atleta-meta">${v.plan}</div>
      </div>
      <div class="atleta-badge ${v.dias <= 7 ? 'badge-asesoria' : 'badge-plan'}">${v.dias}d</div>
    </div>`).join('');
}

function showTab(id, btn) {
  document.querySelectorAll('.p-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── PERFIL ATLETA ────────────────────────────────────────────────────────────
let chartPeso = null, chartStrava = null, chartFuerzaPerfil = null;

function abrirPerfil(id) {
  const a = atletas.find(x => x.id === id);
  if (!a) return;

  document.getElementById('perfilNombre').textContent = a.nombre;
  document.getElementById('perfilSub').textContent = a.plan;
  document.getElementById('perfilAtleta').style.display = 'block';
  document.body.style.overflow = 'hidden';

  // Destruir charts previos
  [chartPeso, chartStrava, chartFuerzaPerfil].forEach(c => c?.destroy());
  chartPeso = chartStrava = chartFuerzaPerfil = null;

  // Generar contenido
  const hoy = new Date();
  const venceStr = a.vencimiento ? `Vence ${new Date(a.vencimiento).toLocaleDateString('es-CL')}` : 'Sin vencimiento';

  // Peso simulado últimos 6 meses
  const pesoDates = Array.from({length:6},(_,i)=>{const d=new Date(hoy);d.setMonth(d.getMonth()-5+i);return d.toLocaleString('es',{month:'short'});});
  const pesoData = Array.from({length:6},(_,i)=> a.peso - 3 + i*0.5 + (Math.random()-0.4)*0.8);

  const exFuerza = Object.keys(a.fuerza);
  const primerEx = exFuerza[0] || null;

  document.getElementById('perfilBody').innerHTML = `
    <!-- Hero -->
    <div class="perfil-hero">
      <div class="perfil-avatar-big">${a.nombre.charAt(0)}</div>
      <div class="perfil-datos">
        <div class="perfil-nombre">${a.nombre}</div>
        <div class="perfil-email">${a.email}</div>
        <div class="perfil-chips">
          <span class="p-chip chip-plan">${a.plan}</span>
          <span class="p-chip chip-dias">${a.diasActivos} días activos</span>
          <span class="p-chip chip-vence">${venceStr}</span>
        </div>
      </div>
    </div>

    <!-- Datos físicos -->
    <div class="datos-grid">
      <div class="dato-cell"><div class="dato-val">${a.peso}</div><div class="dato-lbl">Peso kg</div></div>
      <div class="dato-cell"><div class="dato-val">${a.talla}</div><div class="dato-lbl">Talla cm</div></div>
      <div class="dato-cell"><div class="dato-val">${a.edad}</div><div class="dato-lbl">Edad</div></div>
    </div>

    <!-- Evolución peso -->
    <div class="sec">
      <div class="sec-title">Evolución de Peso</div>
      <div class="chart-wrap"><canvas id="chartPesoP"></canvas></div>
    </div>

    <!-- Strava -->
    ${a.strava ? `
    <div class="sec">
      <div class="sec-title">Strava · Último mes</div>
      <div class="strava-metrics">
        <div class="s-metric">
          <div><span class="s-metric-val">${a.strava.km}</span><span class="s-metric-unit">km</span></div>
          <div class="s-metric-lbl">Distancia</div>
        </div>
        <div class="s-metric">
          <div><span class="s-metric-val">${a.strava.ritmo}</span><span class="s-metric-unit">min/km</span></div>
          <div class="s-metric-lbl">Ritmo medio</div>
        </div>
        <div class="s-metric">
          <div><span class="s-metric-val">${a.strava.fc}</span><span class="s-metric-unit">bpm</span></div>
          <div class="s-metric-lbl">FC media</div>
        </div>
        <div class="s-metric">
          <div><span class="s-metric-val">${a.strava.actividades}</span></div>
          <div class="s-metric-lbl">Actividades</div>
        </div>
      </div>
      <div class="chart-wrap" style="margin-top:12px;"><canvas id="chartStravaP"></canvas></div>
    </div>` : `
    <div class="sec">
      <div class="sec-title">Strava</div>
      <div class="empty"><div class="empty-icon">🔗</div><div class="empty-text">Sin Strava conectado</div></div>
    </div>`}

    <!-- Fuerza TrainHeroic -->
    <div class="sec">
      <div class="sec-title">Fuerza · TrainHeroic</div>
      ${exFuerza.length ? `
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
        ${exFuerza.map((ex,i) => `<div class="th-mini-exercise${i===0?' active':''}" onclick="selExPerfil('${ex}',this)">${ex}</div>`).join('')}
      </div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px;">
        <span class="th-mini-best" id="bestPerfil">${Math.max(...a.fuerza[primerEx])}</span>
        <span class="th-mini-unit">kg working max</span>
      </div>
      <div class="chart-wrap"><canvas id="chartFuerzaP"></canvas></div>` :
      `<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-text">Sin datos de TrainHeroic</div></div>`}
    </div>

    <!-- Historial pagos -->
    <div class="sec">
      <div class="sec-title">Historial de Pagos</div>
      ${a.pagos.length ? a.pagos.map(p => `
        <div class="pago-row">
          <div><div class="pago-plan">${p.plan}</div><div class="pago-fecha">${p.fecha}</div></div>
          <div style="text-align:right;"><div class="pago-monto">${p.monto}</div><span class="pago-estado estado-ok">Pagado</span></div>
        </div>`).join('') :
      '<div class="empty" style="padding:20px 0;"><div class="empty-text">Sin pagos</div></div>'}
    </div>

    <!-- Notas privadas -->
    <div class="sec">
      <div class="sec-title">Notas del Coach (privadas)</div>
      <textarea class="nota-textarea" id="notaText" placeholder="Observaciones, ajustes, indicaciones...">${a.notas}</textarea>
      <button class="nota-save" onclick="guardarNota(${a.id})">Guardar nota</button>
    </div>

    <div style="height:40px;"></div>
  `;

  // Init charts
  setTimeout(() => {
    // Chart peso
    const cpCtx = document.getElementById('chartPesoP');
    if (cpCtx) {
      chartPeso = new Chart(cpCtx, {
        type: 'line',
        data: {
          labels: pesoDates,
          datasets: [{
            data: pesoData.map(v => Math.round(v*10)/10),
            borderColor: '#00c8d4',
            backgroundColor: (ctx2) => {const g=ctx2.chart.ctx.createLinearGradient(0,0,0,120);g.addColorStop(0,'rgba(0,200,212,0.15)');g.addColorStop(1,'rgba(0,200,212,0)');return g;},
            fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#00c8d4', borderWidth: 2
          }]
        },
        options: chartOpts({ y: { min: a.peso-4, max: a.peso+1, ticks: { callback: v=>v+' kg' } } })
      });
    }

    // Chart Strava
    if (a.strava) {
      const csCtx = document.getElementById('chartStravaP');
      if (csCtx) {
        const kmData = Array.from({length:6},(_,i)=> Math.round(a.strava.km * (0.6+i*0.08) + (Math.random()-0.5)*8));
        chartStrava = new Chart(csCtx, {
          type: 'bar',
          data: {
            labels: pesoDates,
            datasets: [{
              data: kmData,
              backgroundColor: 'rgba(0,200,212,0.25)',
              borderColor: '#00c8d4',
              borderWidth: 1, borderRadius: 3
            }]
          },
          options: chartOpts({ y: { ticks: { callback: v=>v+' km' } } })
        });
      }
    }

    // Chart fuerza
    if (exFuerza.length) {
      const cfCtx = document.getElementById('chartFuerzaP');
      if (cfCtx) {
        const fd = a.fuerza[primerEx];
        chartFuerzaPerfil = new Chart(cfCtx, {
          type: 'line',
          data: {
            labels: fd.map((_,i)=>'S'+(i+1)),
            datasets: [{
              data: fd,
              borderColor: '#d4a843',
              backgroundColor: (ctx2) => {const g=ctx2.chart.ctx.createLinearGradient(0,0,0,120);g.addColorStop(0,'rgba(212,168,67,0.15)');g.addColorStop(1,'rgba(212,168,67,0)');return g;},
              fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2
            }]
          },
          options: chartOpts({ y: { ticks: { callback: v=>v+' kg' } } })
        });
      }
    }

    window._perfilAtletaData = a;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }, 150);
}

function chartOpts(extra = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#1a1d1c', titleColor: '#d4a843', bodyColor: '#f0ece6',
      borderColor: 'rgba(212,168,67,0.2)', borderWidth: 1, padding: 10, cornerRadius: 6
    }},
    scales: {
      x: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'transparent' } },
      y: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'transparent' }, ...( extra.y || {}) }
    },
    elements: { point: { radius: 0, hoverRadius: 3 }, line: { tension: 0.3, borderWidth: 2 } },
    ...extra
  };
}

function selExPerfil(ex, btn) {
  const a = window._perfilAtletaData;
  if (!a || !a.fuerza[ex]) return;
  document.querySelectorAll('.th-mini-exercise').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const fd = a.fuerza[ex];
  document.getElementById('bestPerfil').textContent = Math.max(...fd);
  if (chartFuerzaPerfil) {
    chartFuerzaPerfil.data.labels = fd.map((_,i) => 'S'+(i+1));
    chartFuerzaPerfil.data.datasets[0].data = fd;
    chartFuerzaPerfil.update('active');
  }
}

function guardarNota(id) {
  const nota = document.getElementById('notaText').value;
  const a = atletas.find(x => x.id === id);
  if (a) a.notas = nota;
  // En producción: guardar en Firebase
  const btn = document.querySelector('.nota-save');
  const orig = btn.textContent;
  btn.textContent = '✓ Guardado';
  btn.style.color = '#2ecc71';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
}

function cerrarPerfil() {
  document.getElementById('perfilAtleta').style.display = 'none';
  document.body.style.overflow = '';
  [chartPeso, chartStrava, chartFuerzaPerfil].forEach(c => c?.destroy());
  chartPeso = chartStrava = chartFuerzaPerfil = null;
}

// Init lucide
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
