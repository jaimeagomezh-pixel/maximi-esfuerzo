<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo · Resultado Test de Ruck (rkFTP) — Máximo Esfuerzo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07090b; color: #f1ece4; font-family: 'Barlow', sans-serif; padding: 28px 18px 60px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 460px; margin: 0 auto; }

  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: #C9A84C; letter-spacing: 2px; line-height: 1; }
  .sub { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 2px; color: #6b6760; text-transform: uppercase; margin-top: 4px; margin-bottom: 22px; }

  /* ── Panel de controles ── */
  .panel { background: #0e1115; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; color: #8a857c; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  input[type=number], select { width: 100%; background: #171b20; border: 1px solid rgba(255,255,255,0.1); color: #f1ece4; padding: 9px 11px; border-radius: 6px; font-size: 15px; outline: none; }
  input[type=range] { width: 100%; accent-color: #C9A84C; }
  .timeval { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #fff; line-height: 1; }
  .timeval small { font-family: 'Barlow Condensed'; font-size: 0.9rem; color: #8a857c; letter-spacing: 1px; }

  .quick { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 4px; }
  .quick button { flex: 1; min-width: 70px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
    background: #171b20; color: #b8b2a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 8px 4px; cursor: pointer; transition: all .15s; }
  .quick button:hover { border-color: rgba(201,168,76,0.5); color: #fff; }

  .cta { width: 100%; background: #8B1A1A; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700;
    border: none; border-radius: 8px; padding: 13px; cursor: pointer; margin-top: 14px; transition: transform .1s; }
  .cta:active { transform: scale(0.98); }

  /* ════════════ TARJETA DE RESULTADO ════════════ */
  .result { position: relative; border-radius: 16px; padding: 26px 22px 24px; overflow: hidden;
    background: radial-gradient(120% 140% at 50% 0%, var(--glow) 0%, #0b0e11 55%);
    border: 1px solid var(--accent-soft); }
  .result.show { animation: cardIn .55s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(26px) scale(0.96); } to { opacity: 1; transform: none; } }

  /* barrido de brillo (solo élite) */
  .shine { position: absolute; top: 0; left: -60%; width: 50%; height: 100%; pointer-events: none;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.18), transparent); }
  .result.elite .shine { animation: sweep 2.4s ease 0.6s infinite; }
  @keyframes sweep { 0% { left: -60%; } 55%,100% { left: 130%; } }

  .r-top { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; color: #8a857c; text-transform: uppercase; text-align: center;
    opacity: 0; animation: fadeUp .5s ease .15s both; }

  /* Sello / badge del nivel */
  .badge { text-align: center; margin: 10px 0 4px; }
  .badge .stamp { display: inline-block; font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; line-height: 1; letter-spacing: 2px; color: var(--accent);
    padding: 4px 22px; border: 3px solid var(--accent); border-radius: 10px; position: relative;
    text-shadow: 0 2px 18px var(--glow); }
  .result.show .badge .stamp { animation: stampIn .5s cubic-bezier(0.34,1.56,0.64,1) .3s both; }
  @keyframes stampIn {
    0% { opacity: 0; transform: scale(1.8) rotate(-8deg); }
    60% { opacity: 1; transform: scale(0.94) rotate(-3deg); }
    100% { opacity: 1; transform: scale(1) rotate(-3deg); }
  }
  .badge .ico { font-size: 1.4rem; margin-bottom: 2px; opacity: 0; }
  .result.show .badge .ico { animation: fadeUp .4s ease .2s both; }

  .r-time { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #fff; letter-spacing: 1px; margin-top: 10px;
    opacity: 0; }
  .result.show .r-time { animation: fadeUp .5s ease .55s both; }
  .r-time small { font-family: 'Barlow Condensed'; font-size: 0.7em; color: #8a857c; letter-spacing: 1px; }

  /* línea de tiempo de niveles */
  .timeline { margin: 20px 4px 6px; opacity: 0; }
  .result.show .timeline { animation: fadeUp .5s ease .7s both; }
  .tl-bar { position: relative; height: 8px; border-radius: 5px; display: flex; overflow: hidden; }
  .tl-seg { height: 100%; }
  .tl-marker { position: absolute; top: -7px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 9px solid #fff;
    transform: translateX(-50%); transition: left 1s cubic-bezier(0.16,1,0.3,1); filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
  .tl-labels { display: flex; justify-content: space-between; margin-top: 7px; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 1px; color: #5f5b54; text-transform: uppercase; }

  /* métricas (watts + ritmo) */
  .metrics { display: flex; gap: 12px; margin-top: 20px; opacity: 0; }
  .result.show .metrics { animation: fadeUp .5s ease .85s both; }
  .metric { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; text-align: center; }
  .metric .v { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .metric .v small { font-family: 'Barlow Condensed'; font-size: 0.5em; color: #8a857c; letter-spacing: 1px; }
  .metric .k { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 2px; color: #8a857c; text-transform: uppercase; margin-top: 4px; }

  .r-msg { font-size: 13px; line-height: 1.55; color: #c9c3b9; text-align: center; margin-top: 18px; padding: 0 4px;
    opacity: 0; }
  .result.show .r-msg { animation: fadeUp .5s ease 1s both; }
  .r-msg strong { color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .note { font-size: 11px; color: #5f5b54; text-align: center; margin-top: 22px; line-height: 1.5; font-family: 'Barlow Condensed'; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Test de Umbral · Ruck 4.8 km</h1>
  <div class="sub">Demostración del resultado en pantalla · rkFTP</div>

  <div class="panel">
    <div class="row">
      <div>
        <label class="lbl">Peso corporal (kg)</label>
        <input type="number" id="bw" value="80" min="45" max="140" step="0.5">
      </div>
      <div>
        <label class="lbl">Lastre (kg)</label>
        <input type="number" id="load" value="20" min="5" max="60" step="0.5">
      </div>
    </div>
    <div class="row" style="grid-template-columns:1fr;">
      <div>
        <label class="lbl">Terreno</label>
        <select id="terr">
          <option value="1.0">Asfalto / pista</option>
          <option value="1.1">Tierra / camino</option>
          <option value="1.2">Trail / sendero</option>
          <option value="2.1">Arena</option>
        </select>
      </div>
    </div>
    <label class="lbl">Tiempo del test (3 millas)</label>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;">
      <div class="timeval"><span id="tmin">42</span>:<span id="tsec">00</span> <small>min</small></div>
      <input type="range" id="time" min="1680" max="3900" step="15" value="2520" style="flex:1;">
    </div>
    <div class="quick">
      <button onclick="jump(2040)">≈34 min</button>
      <button onclick="jump(2520)">≈42 min</button>
      <button onclick="jump(3000)">≈50 min</button>
      <button onclick="jump(3540)">≈59 min</button>
    </div>
    <button class="cta" onclick="reveal()">Ver resultado en pantalla ▸</button>
  </div>

  <div id="mount"></div>

  <div class="note">
    Estándar militar USMC / Ranger / SFAS: 3 millas (4.8 km) con 20 kg.<br>
    El costo metabólico (Pandolf) sostenido define tu <b>rkFTP</b> — la base del rkTSS.
  </div>
</div>

<script>
// ── Lógica espejo de endurance-module.js (Pandolf + clasificación) ──
function pandolfWatts(W, L, V, G, eta) {
  L = L > 0 ? L : 0; G = G > 0 ? G : 0; eta = eta > 0 ? eta : 1.0;
  return 1.5*W + 2.0*(W+L)*Math.pow(L/W,2) + eta*(W+L)*(1.5*V*V + 0.35*V*G);
}
function calcularRkFTP(W, L, distM, sec, eta, G) {
  const V = distM / sec;
  const watts = pandolfWatts(W, L, V, G, eta);
  const min = sec / 60;
  let nivel;
  if      (min <= 36) nivel = 'Élite';
  else if (min <= 45) nivel = 'Apto';
  else if (min <= 55) nivel = 'En desarrollo';
  else                nivel = 'Base';
  return { watts: Math.round(watts*10)/10, paceSecKm: Math.round(1000/V), min: Math.round(min*10)/10, nivel };
}

const TIERS = {
  'Élite':         { accent:'#C9A84C', glow:'rgba(201,168,76,0.30)', soft:'rgba(201,168,76,0.45)', ico:'★', cls:'elite',
                     msg:'Nivel de <strong>fuerza-resistencia de élite</strong>. Igualas el estándar de operadores tácticos. Tu umbral rkFTP es alto: el rkTSS reflejará tu capacidad real bajo carga.' },
  'Apto':          { accent:'#27ae60', glow:'rgba(39,174,96,0.22)', soft:'rgba(39,174,96,0.40)', ico:'✓', cls:'apto',
                     msg:'Cumples el <strong>estándar militar "apto"</strong> (corte 45 min). Base sólida de marcha con carga. Tu rkFTP queda registrado para calibrar el rkTSS.' },
  'En desarrollo': { accent:'#e07b00', glow:'rgba(224,123,0,0.20)', soft:'rgba(224,123,0,0.38)', ico:'▲', cls:'dev',
                     msg:'Vas <strong>en camino</strong>. Con bloques de marcha progresiva bajarás del corte de 45 min. El rkTSS te mostrará semana a semana cómo sube tu umbral.' },
  'Base':          { accent:'#8B1A1A', glow:'rgba(139,26,26,0.22)', soft:'rgba(139,26,26,0.42)', ico:'●', cls:'base',
                     msg:'Punto de <strong>partida registrado</strong>. Todo gran ruck empieza aquí. Construye volumen con carga ligera y repite el test en 4-6 semanas.' }
};

// Posición del marcador en la línea de tiempo (rango visual 30–62 min)
function markerPct(min) {
  const lo = 30, hi = 62;
  return Math.max(0, Math.min(100, (min - lo) / (hi - lo) * 100));
}

function fmtTime(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

const timeEl = document.getElementById('time');
function syncTimeLabel() {
  const sec = +timeEl.value;
  document.getElementById('tmin').textContent = Math.floor(sec/60);
  document.getElementById('tsec').textContent = String(sec%60).padStart(2,'0');
}
timeEl.addEventListener('input', syncTimeLabel);
syncTimeLabel();

function jump(sec) { timeEl.value = sec; syncTimeLabel(); reveal(); }

function reveal() {
  const W = +document.getElementById('bw').value || 80;
  const L = +document.getElementById('load').value || 20;
  const eta = +document.getElementById('terr').value || 1.0;
  const sec = +timeEl.value;
  const r = calcularRkFTP(W, L, 4800, sec, eta, 0);
  const t = TIERS[r.nivel];
  const paceStr = Math.floor(r.paceSecKm/60) + ':' + String(r.paceSecKm%60).padStart(2,'0');

  const mount = document.getElementById('mount');
  mount.innerHTML = `
    <div class="result ${t.cls}" style="--accent:${t.accent};--glow:${t.glow};--accent-soft:${t.soft};">
      <div class="shine"></div>
      <div class="r-top">Resultado del test · 4.8 km</div>
      <div class="badge">
        <div class="ico" style="color:${t.accent};">${t.ico}</div>
        <div class="stamp">${r.nivel}</div>
      </div>
      <div class="r-time">${fmtTime(sec)} <small>min · ${L} kg</small></div>

      <div class="timeline">
        <div class="tl-bar">
          <div class="tl-seg" style="width:18.75%;background:#C9A84C;"></div>
          <div class="tl-seg" style="width:28.12%;background:#27ae60;"></div>
          <div class="tl-seg" style="width:31.25%;background:#e07b00;"></div>
          <div class="tl-seg" style="flex:1;background:#8B1A1A;"></div>
          <div class="tl-marker" id="mk" style="left:0%;"></div>
        </div>
        <div class="tl-labels"><span>Élite</span><span>Apto</span><span>Desarrollo</span><span>Base</span></div>
      </div>

      <div class="metrics">
        <div class="metric"><div class="v"><span id="wattsCount">0</span> <small>W</small></div><div class="k">Umbral rkFTP</div></div>
        <div class="metric"><div class="v">${paceStr} <small>/km</small></div><div class="k">Ritmo umbral</div></div>
      </div>

      <div class="r-msg">${t.msg}</div>
    </div>`;

  const card = mount.querySelector('.result');
  // forzar reflow para reiniciar animaciones
  void card.offsetWidth;
  card.classList.add('show');

  // marcador se desliza a su posición
  setTimeout(() => { document.getElementById('mk').style.left = markerPct(r.min) + '%'; }, 750);
  // conteo de watts
  countUp(document.getElementById('wattsCount'), r.watts, 900, 700);
}

function countUp(el, target, dur, delay) {
  setTimeout(() => {
    const t0 = performance.now();
    let done = false;
    function step(now) {
      const p = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased);
      if (p < 1) requestAnimationFrame(step);
      else { el.textContent = Math.round(target); done = true; }
    }
    requestAnimationFrame(step);
    // Garantía: si rAF está congelado (pestaña en 2º plano), fijar el valor final igual.
    setTimeout(() => { if (!done) el.textContent = Math.round(target); }, delay + dur + 200);
  }, delay);
}

// Mostrar uno al cargar
reveal();
</script>
</body>
</html>
