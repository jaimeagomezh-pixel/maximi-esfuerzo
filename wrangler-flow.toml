name = "flow-payments"
main = "flow-worker.js"
compatibility_date = "2026-05-23"

[[kv_namespaces]]
binding = "RUCK_DATA"
id = "785dd0d41ab34c2e868975d6d0a26bcd"

# Cron: verificar vencimientos cada día a las 8:00 AM (UTC-3 Chile = 11:00 UTC)
[triggers]
crons = ["0 11 * * *"]

# PAGO_DATA — KV opcional para registrar compras
# Para activarlo: npx wrangler kv:namespace create "pago-data"
# y agregar el binding aquí con el ID resultante
