<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — MÁXIMO ESFUERZO | Táctica y Ciencia</title>
<meta name="description" content="Artículos de fuerza, endurance, nutrición, mentalidad y rucking. Estrategia aplicada para el atleta serio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260614a">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ── BLOG INDEX PAGE ───────────────────────────────────── */

/* Hero del blog */
.blog-hero {
  padding: 100px 5vw 60px;
  background: var(--negro);
  border-bottom: 1px solid #1a1a1a;
}
.blog-hero-inner {
  max-width: 900px;
  margin: 0 auto;
}
.blog-hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 8vw, 7rem);
  line-height: 0.9;
  letter-spacing: 2px;
  color: var(--blanco);
  margin: 10px 0 16px;
}
.blog-hero h1 span { color: var(--dorado); }
.blog-hero p {
  font-family: 'Barlow', sans-serif;
  font-size: 1rem;
  color: var(--gris);
  max-width: 420px;
}
.blog-hero-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gris-suave);
  margin-top: 20px;
}

/* Filtros de categoría */
.blog-filters-wrap {
  background: var(--negro);
  position: sticky;
  top: 60px;
  z-index: 90;
  border-bottom: 1px solid #1a1a1a;
  padding: 0 5vw;
}
.blog-filters {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.blog-filters::-webkit-scrollbar { display: none; }
.blog-filter-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gris);
  padding: 16px 18px;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.blog-filter-btn:hover { color: var(--dorado); }
.blog-filter-btn.active {
  color: var(--dorado);
  border-bottom-color: var(--dorado);
}

/* Grid de artículos */
.blog-main {
  padding: 48px 5vw 80px;
  background: var(--negro);
  min-height: 60vh;
}
.blog-main-inner {
  max-width: 900px;
  margin: 0 auto;
}
.blog-page-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Tarjeta de artículo */
.blog-page-card {
  display: block;
  text-decoration: none;
  color: inherit;
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 6px;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1),
              border-color 0.3s,
              box-shadow 0.3s;
  position: relative;
}
.blog-page-card:hover {
  transform: translateY(-5px);
  border-color: #2a2a2a;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}
.blog-page-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 2px;
  transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
}
.blog-page-card:hover::after { width: 100%; }

/* Colores por categoría en el borde inferior */
.blog-page-card[data-cat="fuerza"]::after    { background: #00a8b3; }
.blog-page-card[data-cat="endurance"]::after { background: #e74c3c; }
.blog-page-card[data-cat="nutricion"]::after { background: #3dba7c; }
.blog-page-card[data-cat="mentalidad"]::after{ background: #9b8ea0; }
.blog-page-card[data-cat="rucking"]::after   { background: #a07840; }

/* Imagen placeholder de la tarjeta */
.bpc-img {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 4px;
  position: relative;
  overflow: hidden;
}
.bpc-img::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.04) 0%, transparent 60%);
}
.bpc-img-label {
  position: relative;
  z-index: 1;
  opacity: 0.18;
}

/* Colores de fondo por categoría */
.bpc-img[data-cat="fuerza"]    { background: linear-gradient(135deg, #001a1e, #001520); }
.bpc-img[data-cat="endurance"] { background: linear-gradient(135deg, #1a0505, #200808); }
.bpc-img[data-cat="nutricion"] { background: linear-gradient(135deg, #001a0a, #001508); }
.bpc-img[data-cat="mentalidad"]{ background: linear-gradient(135deg, #12101a, #0e0c18); }
.bpc-img[data-cat="rucking"]   { background: linear-gradient(135deg, #161008, #120e06); }

/* Color del texto label por categoría */
.bpc-img[data-cat="fuerza"]    .bpc-img-label { color: #00a8b3; }
.bpc-img[data-cat="endurance"] .bpc-img-label { color: #e74c3c; }
.bpc-img[data-cat="nutricion"] .bpc-img-label { color: #3dba7c; }
.bpc-img[data-cat="mentalidad"].bpc-img-label { color: #9b8ea0; }
.bpc-img[data-cat="rucking"]   .bpc-img-label { color: #a07840; }

/* Contenido de la tarjeta */
.bpc-body { padding: 18px 18px 20px; }
.bpc-cat {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.bpc-cat[data-cat="fuerza"]    { color: #00a8b3; }
.bpc-cat[data-cat="endurance"] { color: #e74c3c; }
.bpc-cat[data-cat="nutricion"] { color: #3dba7c; }
.bpc-cat[data-cat="mentalidad"]{ color: #9b8ea0; }
.bpc-cat[data-cat="rucking"]   { color: #a07840; }

.bpc-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--blanco);
  margin-bottom: 8px;
  transition: color 0.2s;
}
.blog-page-card:hover .bpc-title { color: var(--dorado-suave); }

.bpc-excerpt {
  font-size: 0.78rem;
  color: var(--gris);
  line-height: 1.6;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bpc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gris-suave);
}
.bpc-read-time { display: flex; align-items: center; gap: 5px; }
.bpc-read-time::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gris-suave);
}

/* Estado vacío */
.blog-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--gris);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Ocultar tarjetas filtradas */
.blog-page-card.hidden {
  display: none;
}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 768px) {
  .blog-hero { padding: 90px 5vw 40px; }
  .blog-page-grid {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .bpc-img { height: 110px; font-size: 2rem; }
}
@media (max-width: 480px) {
  .blog-page-grid { grid-template-columns: 1fr; }
  .blog-filter-btn { padding: 14px 12px; font-size: 0.68rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <a href="index.html" style="display:inline-block;">
      <img src="Imagenes/img01.png" alt="Máximo Esfuerzo" style="height:36px;width:auto;filter:drop-shadow(0 0 4px rgba(212,168,67,0.4));">
    </a>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Planes</a></li>
    <li><a href="blog.html" style="color:var(--dorado)">Blog</a></li>
    <li><a href="index.html#resenas">Resultados</a></li>
    <li><a href="index.html" class="nav-cta">INGRESAR</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <a href="index.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;" class="btn-ingresar">
      <img src="Imagenes/img02.png" style="height:20px;width:auto;filter:drop-shadow(0 0 3px rgba(212,168,67,0.5));">
      <span>Atleta</span>
    </a>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" onclick="toggleMenu()">Planes</a>
  <a href="blog.html" onclick="toggleMenu()" style="color:var(--dorado)">Blog</a>
  <a href="index.html#resenas" onclick="toggleMenu()">Resultados</a>
  <a href="index.html" class="nav-cta" onclick="toggleMenu()">Empezar Ahora</a>
</div>

<!-- HERO DEL BLOG -->
<div class="blog-hero">
  <div class="blog-hero-inner">
    <div class="section-label">Conocimiento</div>
    <h1>TÁCTICA<br><span>Y CIENCIA</span></h1>
    <p>Estrategia aplicada para el atleta serio. Sin relleno, sin mitos.</p>
    <div class="blog-hero-count" id="articleCount">— artículos</div>
  </div>
</div>

<!-- FILTROS STICKY -->
<div class="blog-filters-wrap">
  <div class="blog-filters">
    <button class="blog-filter-btn active" data-cat="all">Todos</button>
    <button class="blog-filter-btn" data-cat="fuerza">Fuerza</button>
    <button class="blog-filter-btn" data-cat="endurance">Endurance</button>
    <button class="blog-filter-btn" data-cat="nutricion">Nutrición</button>
    <button class="blog-filter-btn" data-cat="mentalidad">Mentalidad</button>
    <button class="blog-filter-btn" data-cat="rucking">Rucking</button>
  </div>
</div>

<!-- GRID DE ARTÍCULOS -->
<div class="blog-main">
  <div class="blog-main-inner">
    <div class="blog-page-grid" id="blogGrid">
      <!-- Poblado por JS -->
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    <img src="Imagenes/img01.png" alt="Máximo Esfuerzo" style="height:48px;width:auto;opacity:0.9;">
  </div>
  <ul class="footer-links">
    <li><a href="index.html">Planes</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="index.html#resenas">Resultados</a></li>
    <li><a href="/privacidad.html">Privacidad</a></li>
  </ul>
  <div class="footer-copy">© 2025 Élite Training</div>
</footer>

<script src="blog-data.js"></script>
<script>
  /* ── Nav hamburger ── */
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const m = document.getElementById('mobileMenu');
    const h = document.querySelector('.hamburger');
    if (m.classList.contains('open') && !m.contains(e.target) && !h.contains(e.target)) {
      m.classList.remove('open');
    }
  });

  /* ── Renderizar tarjetas ── */
  function renderCards(data) {
    const grid = document.getElementById('blogGrid');
    if (!data.length) {
      grid.innerHTML = '<div class="blog-empty">No hay artículos en esta categoría todavía.</div>';
      return;
    }
    grid.innerHTML = data.map(a => `
      <a class="blog-page-card" href="articulo.html?slug=${a.slug}" data-cat="${a.category}">
        <div class="bpc-img" data-cat="${a.category}">
          <div class="bpc-img-label">${a.imgLabel}</div>
        </div>
        <div class="bpc-body">
          <div class="bpc-cat" data-cat="${a.category}">${a.categoryLabel}</div>
          <div class="bpc-title">${a.title}</div>
          <div class="bpc-excerpt">${a.excerpt}</div>
          <div class="bpc-meta">
            <span>${a.date}</span>
            <span class="bpc-read-time">${a.readTime} min lectura</span>
          </div>
        </div>
      </a>
    `).join('');
  }

  /* ── Filtrar por categoría ── */
  let activeCat = 'all';

  function filterCards(cat) {
    activeCat = cat;
    const cards = document.querySelectorAll('.blog-page-card');
    cards.forEach(card => {
      if (cat === 'all' || card.dataset.cat === cat) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });

    // Actualizar contador
    const visible = cat === 'all' ? BLOG_DATA.length
      : BLOG_DATA.filter(a => a.category === cat).length;
    document.getElementById('articleCount').textContent =
      `${visible} artículo${visible !== 1 ? 's' : ''}`;
  }

  /* ── Event listeners de tabs ── */
  document.querySelectorAll('.blog-filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.blog-filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      filterCards(this.dataset.cat);
    });
  });

  /* ── Leer categoría inicial desde URL hash ── */
  const hashCat = window.location.hash.replace('#', '');
  const validCats = ['fuerza', 'endurance', 'nutricion', 'mentalidad', 'rucking'];

  /* ── Inicializar ── */
  renderCards(BLOG_DATA);

  if (hashCat && validCats.includes(hashCat)) {
    const targetBtn = document.querySelector(`.blog-filter-btn[data-cat="${hashCat}"]`);
    if (targetBtn) targetBtn.click();
  } else {
    document.getElementById('articleCount').textContent =
      `${BLOG_DATA.length} artículos`;
  }
</script>
</body>
</html>
