<style>
/* ── BLOG INDEX — TEMA CLARO ───────────────────────────── */

body { background: #f5f2ee; }

/* Overrides de clases globales para tema claro */
.section-label          { color: var(--rojo) !important; }
.section-label::before  { background: var(--rojo) !important; }

/* Hero */
.blog-hero {
  padding: 100px 5vw 60px;
  background: #edeae5;
  border-bottom: 1px solid #d4d0ca;
}
.blog-hero-inner { max-width: 900px; margin: 0 auto; }
.blog-hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 8vw, 7rem);
  line-height: 0.9;
  letter-spacing: 2px;
  color: #111;
  margin: 10px 0 16px;
}
.blog-hero h1 span { color: var(--rojo); }
.blog-hero p {
  font-family: 'Barlow', sans-serif;
  font-size: 1rem;
  color: #555;
  max-width: 420px;
}
.blog-hero-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #888;
  margin-top: 20px;
}

/* Buscador */
.blog-search {
  position: relative;
  max-width: 440px;
  margin-top: 26px;
}
.blog-search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  font-size: 0.92rem;
  pointer-events: none;
}
.blog-search-input {
  width: 100%;
  background: #ffffff;
  border: 1px solid #d4d0ca;
  border-radius: 30px;
  padding: 13px 44px 13px 46px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  color: #222;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.blog-search-input::placeholder { color: #aaa; }
.blog-search-input:focus {
  border-color: #c0392b;
  box-shadow: 0 0 0 3px rgba(192,57,43,0.10);
}
.blog-search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 30px; height: 30px;
  border: none;
  background: none;
  color: #aaa;
  cursor: pointer;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, background 0.2s;
}
.blog-search-clear:hover { color: #c0392b; background: rgba(0,0,0,0.04); }
.blog-search.has-text .blog-search-clear { display: flex; }

/* Filtros sticky */
.blog-filters-wrap {
  background: #f5f2ee;
  position: sticky;
  top: 60px;
  z-index: 90;
  border-bottom: 1px solid #d4d0ca;
  padding: 0 5vw;
}
.blog-filters-inner {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
}
.blog-filters {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.blog-filters::-webkit-scrollbar { display: none; }
.blog-filter-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #888;
  padding: 16px 18px;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.blog-filter-btn:hover { color: #111; }
.blog-filter-btn.active {
  color: #111;
  border-bottom-color: #111;
}

/* Indicador de scroll en los filtros (invita a deslizar a la derecha) */
.blog-filters-hint {
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  width: 64px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  border: none;
  cursor: pointer;
  background: linear-gradient(to right, rgba(245,242,238,0) 0%, #f5f2ee 60%);
  color: #c0392b;
  font-size: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.blog-filters-hint.visible { opacity: 1; pointer-events: auto; }
.blog-filters-hint i { animation: hintNudge 1.3s ease-in-out infinite; }
@keyframes hintNudge {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(5px); }
}

/* Logo footer como botón */
.footer-logo-img { transition: opacity 0.2s, filter 0.2s; }
.footer-logo a:hover .footer-logo-img {
  opacity: 1 !important;
  filter: drop-shadow(0 0 6px rgba(212,168,67,0.5));
}

/* Grid principal */
.blog-main {
  padding: 48px 5vw 80px;
  background: #f5f2ee;
  min-height: 60vh;
}
.blog-main-inner { max-width: 900px; margin: 0 auto; }
.blog-page-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Tarjeta */
.blog-page-card {
  display: block;
  text-decoration: none;
  color: inherit;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.09);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.3s,
              border-color 0.3s;
  position: relative;
}
.blog-page-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.12);
  border-color: rgba(0,0,0,0.14);
}
.blog-page-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 3px;
  transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
}
.blog-page-card:hover::after { width: 100%; }

/* Borde de color inferior por categoría */
.blog-page-card[data-cat="fuerza"]::after    { background: #00a8b3; }
.blog-page-card[data-cat="endurance"]::after { background: #e74c3c; }
.blog-page-card[data-cat="nutricion"]::after { background: #3dba7c; }
.blog-page-card[data-cat="mentalidad"]::after{ background: #9b8ea0; }
.blog-page-card[data-cat="rucking"]::after   { background: #a07840; }

/* Imagen placeholder */
.bpc-img {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 4px;
  position: relative;
  overflow: hidden;
}
.bpc-img::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.06) 0%, transparent 60%);
}
.bpc-img-label { position: relative; z-index: 1; opacity: 0.22; }

/* Fondos por categoría */
.bpc-img[data-cat="fuerza"]    { background: linear-gradient(135deg, #001a1e, #001520); }
.bpc-img[data-cat="endurance"] { background: linear-gradient(135deg, #1a0505, #200808); }
.bpc-img[data-cat="nutricion"] { background: linear-gradient(135deg, #001a0a, #001508); }
.bpc-img[data-cat="mentalidad"]{ background: linear-gradient(135deg, #12101a, #0e0c18); }
.bpc-img[data-cat="rucking"]   { background: linear-gradient(135deg, #161008, #120e06); }

/* Colores label en imagen */
.bpc-img[data-cat="fuerza"]    .bpc-img-label { color: #00a8b3; }
.bpc-img[data-cat="endurance"] .bpc-img-label { color: #e74c3c; }
.bpc-img[data-cat="nutricion"] .bpc-img-label { color: #3dba7c; }
.bpc-img[data-cat="mentalidad"].bpc-img-label { color: #9b8ea0; }
.bpc-img[data-cat="rucking"]   .bpc-img-label { color: #a07840; }

/* Cuerpo de tarjeta */
.bpc-body { padding: 18px 18px 20px; }
.bpc-cat {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.bpc-cat[data-cat="fuerza"]    { color: #0090a0; }
.bpc-cat[data-cat="endurance"] { color: #c0392b; }
.bpc-cat[data-cat="nutricion"] { color: #27a060; }
.bpc-cat[data-cat="mentalidad"]{ color: #7a6e80; }
.bpc-cat[data-cat="rucking"]   { color: #7a5c28; }

.bpc-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.08rem;
  font-weight: 700;
  line-height: 1.3;
  color: #111;
  margin-bottom: 8px;
  transition: color 0.2s;
}
.blog-page-card:hover .bpc-title { color: #c0392b; }

.bpc-excerpt {
  font-size: 0.83rem;
  color: #555;
  line-height: 1.65;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bpc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #999;
}
.bpc-read-time { display: flex; align-items: center; gap: 5px; }
.bpc-read-time::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #ccc;
}

/* Estado vacío */
.blog-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: #999;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.blog-page-card.hidden { display: none; }

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .blog-hero { padding: 90px 5vw 40px; }
  .blog-page-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
  .bpc-img { height: 110px; font-size: 2rem; }
}
@media (max-width: 480px) {
  .blog-page-grid { grid-template-columns: 1fr; }
  .blog-filter-btn { padding: 14px 12px; font-size: 0.68rem; }
  .blog-fab-top { bottom: 20px; right: 16px; padding: 10px 16px 10px 13px; }
}

/* Botón flotante de subir */
.blog-fab-top {
  position: fixed;
  bottom: 28px;
  right: 24px;
  z-index: 200;
  display: none;
  align-items: center;
  gap: 9px;
  background: #ffffff;
  border: 1px solid #d4d0ca;
  border-radius: 28px;
  padding: 11px 20px 11px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #444;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  transition: border-color 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.blog-fab-top.visible { display: inline-flex; }
.blog-fab-top:hover {
  border-color: #c0392b;
  color: #c0392b;
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
.blog-fab-top i { transition: transform 0.2s; }
.blog-fab-top:hover i { transform: translateY(-3px); }

/* Paginación */
.blog-pagination-wrap {
  margin-top: 60px;
  padding: 40px 5vw;
  border-top: 1px solid #d4d0ca;
}
.blog-pagination {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.blog-pagination-info {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #888;
  margin-right: 20px;
}
.blog-pagination button,
.blog-pagination a {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 14px;
  border: 1px solid #d4d0ca;
  background: #ffffff;
  color: #444;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.blog-pagination button:hover,
.blog-pagination a:hover {
  border-color: #c0392b;
  color: #c0392b;
  background: rgba(192,57,43,0.05);
}
.blog-pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  border-color: #d4d0ca;
}
.blog-pagination button:disabled:hover {
  background: #ffffff;
  color: #444;
}
.blog-pagination .active {
  background: #c0392b;
  color: #ffffff;
  border-color: #c0392b;
}
.blog-pagination .active:hover {
  background: #a03220;
  border-color: #a03220;
}
</style>

<script>
  /* ── Nav hamburger ── */
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const m = document.getElementById('mobileMenu');
    const h = document.querySelector('.hamburger');
    if (m.classList.contains('open') && !m.contains(e.target) && !h.contains(e.target)) {
      m.classList.remove('open');
    }
  });

  /* ── Normalizar texto ── */
  function normalize(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  /* ── Renderizar tarjetas con paginación ── */
  const ITEMS_PER_PAGE = 20;
  let currentPage = 1;
  let visibleArticles = [];

  function renderCards() {
    const grid = document.getElementById('blogGrid');

    // Filtrar artículos
    const filtered = BLOG_DATA.filter(a => {
      const matchCat = activeCat === 'all' || a.category === activeCat;
      const matchSearch = !searchTerm || normalize(a.title + ' ' + a.categoryLabel).includes(searchTerm);
      return matchCat && matchSearch;
    });

    visibleArticles = filtered;
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const grid = document.getElementById('blogGrid');

    if (visibleArticles.length === 0) {
      grid.innerHTML = '<div class="blog-empty" style="grid-column: 1/-1; display:block;">' +
        (searchTerm ? 'No se encontraron artículos para tu búsqueda.' : 'No hay artículos en esta categoría.') +
        '</div>';
      document.getElementById('paginationWrap').style.display = 'none';
      document.getElementById('articleCount').textContent = '0 artículos';
      return;
    }

    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    const pageArticles = visibleArticles.slice(start, end);

    grid.innerHTML = pageArticles.map(a => `
      <a class="blog-page-card" href="articulo.html?slug=${a.slug}"
         data-cat="${a.category}">
        <div class="bpc-img" data-cat="${a.category}">
          <div class="bpc-img-label">${a.imgLabel}</div>
        </div>
        <div class="bpc-body">
          <div class="bpc-cat" data-cat="${a.category}">${a.categoryLabel}</div>
          <div class="bpc-title">${a.title}</div>
          <div class="bpc-excerpt">${a.excerpt}</div>
          <div class="bpc-meta">
            <span>${a.date}</span>
            <span class="bpc-read-time">${a.readTime} min lectura</span>
          </div>
        </div>
      </a>
    `).join('');

    // Mostrar paginación si hay más de una página
    const totalPages = Math.ceil(visibleArticles.length / ITEMS_PER_PAGE);
    if (totalPages > 1) {
      renderPagination(totalPages);
      document.getElementById('paginationWrap').style.display = '';
    } else {
      document.getElementById('paginationWrap').style.display = 'none';
    }

    // Actualizar contador
    document.getElementById('articleCount').textContent =
      `${visibleArticles.length} artículo${visibleArticles.length !== 1 ? 's' : ''}`;

    // Scroll al grid
    window.scrollTo({ top: document.getElementById('blogGrid').offsetTop - 100, behavior: 'smooth' });
  }

  function renderPagination(totalPages) {
    const pagEl = document.getElementById('pagination');
    const items = [];

    items.push(`<div class="blog-pagination-info">${ITEMS_PER_PAGE * (currentPage - 1) + 1}–${Math.min(ITEMS_PER_PAGE * currentPage, visibleArticles.length)} de ${visibleArticles.length}</div>`);

    if (currentPage > 1) {
      items.push(`<button onclick="goToPage(1)">⟨ Primera</button>`);
      items.push(`<button onclick="goToPage(${currentPage - 1})">‹ Anterior</button>`);
    } else {
      items.push(`<button disabled>⟨ Primera</button>`);
      items.push(`<button disabled>‹ Anterior</button>`);
    }

    // Números de página
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage < maxVisible - 1) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }

    if (startPage > 1) items.push('<span style="padding: 0 4px;">…</span>');
    for (let p = startPage; p <= endPage; p++) {
      items.push(`<button onclick="goToPage(${p})" class="${p === currentPage ? 'active' : ''}">${p}</button>`);
    }
    if (endPage < totalPages) items.push('<span style="padding: 0 4px;">…</span>');

    if (currentPage < totalPages) {
      items.push(`<button onclick="goToPage(${currentPage + 1})">Siguiente ›</button>`);
      items.push(`<button onclick="goToPage(${totalPages})">Última ⟩</button>`);
    } else {
      items.push(`<button disabled>Siguiente ›</button>`);
      items.push(`<button disabled>Última ⟩</button>`);
    }

    pagEl.innerHTML = items.join('');
  }

  window.goToPage = function(page) {
    currentPage = page;
    renderPage();
  };

  /* ── Estado de filtros ── */
  let activeCat = 'all';
  let searchTerm = '';

  function applyFilters() {
    renderCards();
  }

  /* ── Tabs de categoría ── */
  document.querySelectorAll('.blog-filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.blog-filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeCat = this.dataset.cat;
      applyFilters();
    });
  });

  /* ── Buscador ── */
  const searchInput = document.getElementById('blogSearch');
  const searchWrap = document.querySelector('.blog-search');
  const searchClear = document.getElementById('blogSearchClear');

  searchInput.addEventListener('input', function() {
    searchTerm = normalize(this.value.trim());
    searchWrap.classList.toggle('has-text', this.value.length > 0);
    applyFilters();
  });
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchTerm = '';
    searchWrap.classList.remove('has-text');
    applyFilters();
    searchInput.focus();
  });

  /* ── Indicador de scroll en filtros ── */
  const filtersEl = document.getElementById('blogFilters');
  const scrollHint = document.getElementById('filterScrollHint');

  function updateScrollHint() {
    const maxScroll = filtersEl.scrollWidth - filtersEl.clientWidth;
    const atEnd = filtersEl.scrollLeft >= maxScroll - 4;
    scrollHint.classList.toggle('visible', maxScroll > 8 && !atEnd);
  }
  filtersEl.addEventListener('scroll', updateScrollHint);
  window.addEventListener('resize', updateScrollHint);
  scrollHint.addEventListener('click', function() {
    filtersEl.scrollBy({ left: 180, behavior: 'smooth' });
  });

  /* ── Botón flotante de subir ── */
  const fabTop = document.getElementById('fabTop');
  window.addEventListener('scroll', function() {
    fabTop.classList.toggle('visible', window.scrollY > 300);
  });
  fabTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* ── Inicializar ── */
  const hashCat = window.location.hash.replace('#', '');
  const validCats = ['fuerza', 'endurance', 'nutricion', 'mentalidad', 'rucking'];

  renderCards();

  if (hashCat && validCats.includes(hashCat)) {
    const targetBtn = document.querySelector(`.blog-filter-btn[data-cat="${hashCat}"]`);
    if (targetBtn) targetBtn.click();
  } else {
    applyFilters();
  }
  updateScrollHint();
</script>
</body>
</html>
